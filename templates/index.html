<!DOCTYPE html>
<html>
<head>
    <title>AI Interview Assistant</title>

    <style>
        body {
            font-family: Arial;
            background: #f0f8ff;
            text-align: center;
        }

        .box {
            background: white;
            width: 400px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 15px;
        }

        button {
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<h1>🤖 AI Interview Assistant</h1>

<div class="box">
<form method="POST" enctype="multipart/form-data">

    <p>🎤 Upload Audio</p>
    <input type="file" name="audio" required><br>

    <p>🎥 Upload Video</p>
    <input type="file" name="video" required><br><br>

    <button type="submit">Analyze</button>

</form>
</div>

</body>
</html>
