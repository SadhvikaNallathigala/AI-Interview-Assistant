<!DOCTYPE html>
<html>
<head>
    <title>AI Interview Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        .navbar {
            padding: 15px;
            background: rgba(0,0,0,0.2);
        }

        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            width: 400px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        input {
            margin: 10px 0;
        }

        button {
            padding: 12px 20px;
            border: none;
            background: #00c6ff;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0072ff;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>🤖 AI Interview Assistant</h2>
</div>

<div class="container">
    <h3>Upload Your Interview</h3>

    <form method="POST" enctype="multipart/form-data">
        <p>🎤 Audio File</p>
        <input type="file" name="audio" required><br>

        <p>🎥 Video File</p>
        <input type="file" name="video" required><br><br>

        <button type="submit">🚀 Analyze</button>
    </form>
</div>

</body>
</html>
