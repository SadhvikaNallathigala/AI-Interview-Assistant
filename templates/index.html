<!DOCTYPE html>
<html>
<head>
    <title>AI Interview Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e0f7fa, #e1f5fe);
            text-align: center;
        }

        .navbar {
            background: #0077b6;
            color: white;
            padding: 15px;
        }

        .container {
            background: white;
            width: 400px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        input {
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: #0077b6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #023e8a;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>🤖 AI Interview Assistant</h2>
</div>

<div class="container">
    <h3>Upload Interview Data</h3>

    <form method="POST" enctype="multipart/form-data">
        <p>🎤 Upload Audio</p>
        <input type="file" name="audio" required><br>

        <p>📸 Upload Image</p>
        <input type="file" name="image" required><br><br>

        <button type="submit">🚀 Analyze</button>
    </form>
</div>

</body>
</html>
