<!DOCTYPE html>
<html>
<head>
    <title>Results</title>

    <style>
        body {
            font-family: Arial;
            background: #e6f7ff;
            text-align: center;
        }

        .card {
            background: white;
            width: 500px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
        }

        .bar {
            height: 20px;
            background: green;
            color: white;
        }
    </style>
</head>

<body>

<div class="card" data-score="{{ score }}">
    <h2>📊 Result</h2>

    <p>{{ text }}</p>
    <p>Sentiment: {{ sentiment }}</p>
    <p>Emotion: {{ emotion }}</p>

    <h3>Score</h3>

    <div style="background:#ccc;">
        <div id="bar" class="bar">0%</div>
    </div>

    <br>
    <a href="/">Go Back</a>
</div>

<script>
    let score = parseFloat(document.querySelector(".card").dataset.score);
    let percent = Math.round(score * 100);

    let bar = document.getElementById("bar");
    bar.style.width = percent + "%";
    bar.innerHTML = percent + "%";
</script>

</body>
</html>
